<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA Logo" class="logo" />
      <h1>Space Explorer</h1>
    </header>

    <div class="filters">
      <input type="date" id="startDate" />
      <input type="date" id="endDate" />
      <button id="fetchButton">Get Space Images</button>
    </div>

    <div id="gallery" class="gallery">
      <div class="placeholder">
        <div class="placeholder-icon">🔭</div>
        <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
      </div>
    </div>

    <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-content">
        <button id="modalClose" class="modal-close" aria-label="Close modal">×</button>
        <div class="modal-body">
          <img id="modalImage" class="modal-image" alt="NASA image" />
          <div id="modalVideo" class="modal-video hidden">
            <p>Video available for this APOD:</p>
            <a id="modalVideoLink" target="_blank" rel="noopener noreferrer"></a>
          </div>
          <div class="modal-text">
            <h2 id="modalTitle"></h2>
            <p id="modalDate" class="modal-date"></p>
            <p id="modalExplanation" class="modal-explanation"></p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
